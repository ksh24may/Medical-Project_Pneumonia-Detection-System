<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pneumonia Detection System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2575fc;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px;
            font-size: 16px;
        }

        .btn-primary {
            width: 100%;
            background: #6a11cb;
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #2575fc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result-card {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            background: #f8f9fa;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .result-card h2 {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-card .pneumonia {
            color: #dc3545; /* Red for Pneumonia */
        }

        .result-card .normal {
            color: #28a745; /* Green for Normal */
        }

        .result-card img {
            margin-top: 20px;
            border-radius: 15px;
            max-width: 100%;
            border: 3px solid #2575fc;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #ffffff;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Pneumonia Detection System</h1>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="file" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Predict</button>
        </form>

        {% if result %}
        <div class="result-card">
            {% if result == 'PNEUMONIA' %}
            <h2 class="pneumonia">Result: {{ result }}</h2>
            {% else %}
            <h2 class="normal">Result: {{ result }}</h2>
            {% endif %}
            <h4>Confidence: {{ confidence }}%</h4>
            <img src="{{ url_for('static', filename=filename) }}" alt="Uploaded Image">
            {% if heatmap_filename %}
            <img src="{{ url_for('static', filename=heatmap_filename) }}" alt="Heatmap Overlay">
            {% endif %}
        </div>
        {% endif %}
    </div>

    <footer>
        &copy; 2026 Pneumonia Detection System | Designed by Madhura Petare
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
